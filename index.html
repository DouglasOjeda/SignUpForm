<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/normalize.css">
    <link rel="stylesheet" href="./styles/styles.css">
    <script src="./scripts.js" defer></script>
    <title>Sign-up Form</title>
</head>
<body>
    <div class="left">
        <div class="logo-container">
            <img src="./images/cloud.svg" alt="" class="logo">
            <p class="logo-name">Cloudora</p>
        </div>
        <p class="photo-credits">Photo by <a href="https://unsplash.com/@efekurnaz" target="_blank" rel="noopener">Efe Kurnaz</a></p>
    </div>
    <div class="right">
        <h1>Sign up today!</h1>
        <div class="input-container">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name">
        </div>
        <div class="button-container">
            <button class="sign-up-button">Hello</button>
        </div>
    </div>
</body>
</html>
